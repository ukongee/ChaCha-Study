version: '3.8'

# EC2 운영용 — 전체 스택 실행
services:
  nginx:
    image: nginx:alpine
    container_name: chachastudy-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: always

  backend:
    image: ghcr.io/ukongee/chacha-study:latest
    container_name: chachastudy-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/chachastudy
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    expose:
      - "8080"

  postgres:
    image: postgres:16-alpine
    container_name: chachastudy-db
    environment:
      POSTGRES_DB: chachastudy
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: chachastudy-redis
    volumes:
      - redis-data:/data
    restart: always

volumes:
  postgres-data:
  redis-data:
